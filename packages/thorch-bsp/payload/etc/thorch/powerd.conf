# Thorch power daemon defaults.
#
# Hardware suspend/resume is not reliable on current SM8550 handheld kernels, so
# the power button enters a userspace low-power state instead.

# Seconds before powering off while fake suspended. Set to 0 to disable.
THORCH_POWERD_SHUTDOWN_DELAY=900

# Parking secondary CPU cores saves power but can disturb affinity-sensitive
# workloads. Keep this off until tested broadly on Thor.
THORCH_POWERD_PARK_CORES=0

# Backlight blanking is safer than display-manager DPMS on this hardware.
THORCH_POWERD_BACKLIGHT_POWER=4
